
  <section class="slide" style="width: 100%; height: 100%; min-height: 100vh; box-sizing: border-box;">
  <style>
    .slide {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
      position: relative;
    }

    .hero-content {
      z-index: 2;
      max-width: 80%;
      margin: 0 auto;
    }

    .hero-title {
      font-family: var(--font-head);
      font-size: clamp(2rem, 5vw, 4.5rem);
      line-height: 1.1;
      margin-bottom: 1.5rem;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: -0.02em;
    }

    .hero-subtitle {
      font-size: clamp(1rem, 2vw, 1.5rem);
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 700px;
      margin: 0 auto 2.5rem auto;
    }

    .cta-badge {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-weight: 600;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: clamp(0.75rem, 1vw, 1rem);
      box-shadow: 0 0 15px var(--accent-glow);
    }

    .deco-ring {
      position: absolute;
      width: 60vh;
      height: 60vh;
      border: 1px solid var(--border);
      border-radius: 50%;
      opacity: 0.3;
      z-index: 1;
      animation: pulse 8s infinite ease-in-out;
    }

    .deco-ring::after {
      content: '';
      position: absolute;
      top: -1px; left: -1px; right: -1px; bottom: -1px;
      border: 1px solid var(--accent);
      border-radius: 50%;
      opacity: 0.5;
      animation: rotate 20s linear infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.1); opacity: 0.1; }
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }
  </style>

  <div class="deco-ring"></div>

  <div class="hero-content">
    <h1 class="hero-title reveal visible active" style="--delay: 0.2s">Global Warming: <br>Challenges and Solutions</h1>
    <p class="hero-subtitle reveal visible active" style="--delay: 0.4s">
      The climate crisis has reached a critical tipping point. As global temperatures continue to rise, our window to secure a sustainable future is narrowing.
    </p>
    <div class="cta-badge reveal visible active" style="--delay: 0.6s">
      Act Now for Tomorrow
    </div>
  </div>

  
</section>
