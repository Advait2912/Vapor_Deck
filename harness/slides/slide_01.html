<section class="slide" style="width: 100%; height: 100%; min-height: 100vh; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--bg); color: var(--text); font-family: var(--font-body); overflow: hidden; position: relative;">
  <style>
    .slide {
      position: relative;
      text-align: center;
      padding: 2rem;
    }
    .hero-content {
      z-index: 2;
      max-width: 900px;
    }
    .title {
      font-family: var(--font-head);
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1.1;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }
    .subtitle {
      font-size: clamp(1.1rem, 1.8vw, 1.5rem);
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 700px;
      margin: 0 auto 2rem auto;
    }
    .deco-ring {
      position: absolute;
      width: 500px;
      height: 500px;
      border: 1px solid var(--accent);
      border-radius: 50%;
      opacity: 0.2;
      filter: blur(2px);
      animation: pulse 8s infinite ease-in-out;
      z-index: 1;
    }
    .deco-ring-2 {
      position: absolute;
      width: 700px;
      height: 700px;
      border: 1px solid var(--accent);
      border-radius: 50%;
      opacity: 0.1;
      filter: blur(4px);
      animation: pulse 12s infinite ease-in-out reverse;
      z-index: 1;
    }
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      animation: revealIn 0.8s forwards cubic-bezier(0.22, 1, 0.36, 1);
      animation-delay: var(--delay);
    }
    @keyframes revealIn {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.2; }
      50% { transform: scale(1.1) rotate(180deg); opacity: 0.3; }
    }
    .accent-bar {
      width: 60px;
      height: 4px;
      background: var(--accent);
      margin: 0 auto 2rem auto;
      box-shadow: 0 0 15px var(--accent-glow);
    }
  </style>

  <div class="deco-ring"></div>
  <div class="deco-ring-2"></div>

  <div class="hero-content">
    <div class="reveal" style="--delay: 0.2s">
      <div class="accent-bar"></div>
    </div>
    <h1 class="title reveal" style="--delay: 0.4s">AI/ML: Architecting the Future of Intelligence</h1>
    <p class="subtitle reveal" style="--delay: 0.6s">
      Exploring the convergence of machine learning and intelligent automation to forge a new era of human-machine synergy.
    </p>
  </div>
</section>
