<section class="slide" style="width: 100%; height: 100%; min-height: 100vh; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: var(--bg); color: var(--text); font-family: var(--font-body); text-align: center; position: relative; overflow: hidden;">
  <style>
    .slide {
      --accent-gradient: linear-gradient(135deg, var(--accent), var(--accent-glow));
      padding: 2rem;
    }
    .hero-container {
      position: relative;
      z-index: 10;
      max-width: 900px;
      width: 100%;
    }
    .hero-title {
      font-family: var(--font-head);
      font-size: clamp(2rem, 5vw, 4.5rem);
      line-height: 1.1;
      margin-bottom: 1.5rem;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }
    .hero-subtitle {
      font-size: clamp(1rem, 2vw, 1.5rem);
      color: var(--text-muted);
      max-width: 700px;
      margin: 0 auto 2rem auto;
      line-height: 1.6;
    }
    .hero-pill {
      display: inline-block;
      padding: 0.5rem 1.2rem;
      border: 1px solid var(--border);
      border-radius: 50px;
      font-size: clamp(0.7rem, 1.2vw, 1rem);
      color: var(--accent);
      background: rgba(var(--accent), 0.1);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 2rem;
    }
    .decorative-ring {
      position: absolute;
      border: 1px solid var(--border);
      border-radius: 50%;
      opacity: 0.3;
      pointer-events: none;
      animation: rotate 20s linear infinite;
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.8s ease forwards;
      animation-delay: var(--delay);
    }
    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

  <!-- Decorative Elements -->
  <div class="decorative-ring" style="width: 80vh; height: 80vh; top: calc(50% - 40vh); left: calc(50% - 40vh);"></div>
  <div class="decorative-ring" style="width: 60vh; height: 60vh; top: calc(50% - 30vh); left: calc(50% - 30vh); animation-direction: reverse;"></div>

  <div class="hero-container">
    <div class="reveal hero-pill visible" style="--delay: 0.2s">
      Engineering the Decentralized Web
    </div>
    
    <h1 class="reveal hero-title visible" style="--delay: 0.4s">
      Blockchain Development and Future Scope
    </h1>
    
    <p class="reveal hero-subtitle visible" style="--delay: 0.6s">
      Exploring the evolution of decentralized ledger technology to bridge the gap between code and commerce. 
      A strategic roadmap for the next generation of developers and investors.
    </p>
  </div>
</section>
