<section class="slide" style="width: 100%; height: 100%; min-height: 100vh; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; padding: 5% 8%; background-color: var(--bg); color: var(--text); font-family: var(--font-body);">
  <style>
    .slide {
      position: relative;
      overflow: hidden;
    }
    .slide-title {
      font-family: var(--font-head);
      font-size: clamp(2rem, 4vw, 3.5rem);
      color: var(--accent);
      margin-bottom: 2rem;
      text-shadow: 0 0 20px var(--accent-glow);
      border-left: 6px solid var(--accent);
      padding-left: 1.5rem;
    }
    .bullet-container {
      list-style: none;
      padding: 0;
      margin: 0;
      width: 100%;
      max-width: 800px;
    }
    .bullet-item {
      display: flex;
      align-items: center;
      font-size: clamp(1.1rem, 2.2vw, 1.8rem);
      margin-bottom: 1.5rem;
      padding: 1rem 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: transform 0.3s ease, border-color 0.3s ease;
    }
    .bullet-item:hover {
      transform: translateX(10px);
      border-color: var(--accent);
    }
    .bullet-item::before {
      content: '→';
      color: var(--accent);
      margin-right: 1rem;
      font-weight: bold;
    }
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s ease-out;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>

  <h1 class="slide-title reveal visible" style="--delay: 0.1s">The Horizon: AI and Interoperability</h1>
  
  <ul class="bullet-container">
    <li class="bullet-item reveal visible" style="--delay: 0.3s">Integration of AI for automated DAO governance</li>
    <li class="bullet-item reveal visible" style="--delay: 0.5s">Cross-chain communication protocols</li>
    <li class="bullet-item reveal visible" style="--delay: 0.7s">Tokenization of real-world assets (RWA)</li>
    <li class="bullet-item reveal visible" style="--delay: 0.9s">The move toward a seamless 'Internet of Blockchains'</li>
  </ul>

  
</section>
