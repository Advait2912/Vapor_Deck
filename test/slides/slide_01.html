<section class="slide" style="width: 100%; height: 100%; min-height: 100vh; box-sizing: border-box; background: var(--surface); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; background-color: #2a2a2a;">
  <style>
    .slide {
      --bg-gradient: radial-gradient(circle at center, #3a3a3a 0%, #1a1a1a 100%);
      background: var(--bg-gradient) !important;
      font-family: var(--font-body);
      color: var(--text);
      text-align: center;
    }

    .hero-container {
      position: relative;
      z-index: 10;
      max-width: 80%;
      margin: 0 auto;
      padding: 2rem;
    }

    .hero-title {
      font-family: var(--font-head);
      font-size: clamp(2.5rem, 6vw, 5rem);
      line-height: 1.1;
      margin-bottom: 1.5rem;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: -0.02em;
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .hero-title span {
      color: var(--accent);
      display: block;
      text-shadow: 0 0 20px var(--accent-glow);
    }

    .hero-subtitle {
      font-size: clamp(1.1rem, 2vw, 1.8rem);
      color: var(--text-muted);
      max-width: 700px;
      margin: 0 auto 3rem auto;
      line-height: 1.6;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .hero-chips {
      display: flex;
      gap: 1rem;
      justify-content: center;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .chip {
      padding: 0.5rem 1.2rem;
      border: 1px solid var(--border);
      border-radius: 50px;
      font-size: clamp(0.8rem, 1vw, 1rem);
      background: rgba(255, 255, 255, 0.05);
      color: var(--accent);
      backdrop-filter: blur(10px);
    }

    .bg-decoration {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .grid-line {
      position: absolute;
      background: rgba(255, 255, 255, 0.03);
    }

    .reveal-active {
      opacity: 1 !important;
      transform: translateY(0) !important;
    }

    .floating-node {
      position: absolute;
      width: 100px;
      height: 100px;
      border: 2px solid var(--accent);
      border-radius: 20%;
      opacity: 0.1;
      animation: float 10s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(30px, -50px) rotate(120deg); }
      66% { transform: translate(-20px, 20px) rotate(240deg); }
    }
  </style>

  <div class="bg-decoration">
    <!-- Decorative floating elements -->
    <div class="floating-node" style="top: 10%; left: 10%; animation-delay: 0s;"></div>
    <div class="floating-node" style="top: 70%; left: 80%; animation-delay: 2s; width: 150px; height: 150px;"></div>
    <div class="floating-node" style="top: 40%; left: 85%; animation-delay: 4s; opacity: 0.05;"></div>
    
    <!-- Grid lines -->
    <div class="grid-line" style="width: 100%; height: 1px; top: 25%;"></div>
    <div class="grid-line" style="width: 100%; height: 1px; top: 75%;"></div>
    <div class="grid-line" style="height: 100%; width: 1px; left: 25%;"></div>
    <div class="grid-line" style="height: 100%; width: 1px; left: 75%;"></div>
  </div>

  <div class="hero-container">
    <h1 class="hero-title reveal" style="--delay: 0.2s">
      Blockchain Development <br><span>and Its Future Scope</span>
    </h1>
    
    <p class="hero-subtitle reveal" style="--delay: 0.5s">
      Exploring the evolution of decentralized infrastructure, from the technical foundations of distributed ledgers to architecting a globally scalable web.
    </p>

    <div class="hero-chips reveal" style="--delay: 0.8s">
      <div class="chip">Decentralized Web</div>
      <div class="chip">Global Scale</div>
      <div class="chip">Web3 Architecture</div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const elements = document.querySelectorAll('.reveal');
      elements.forEach(el => {
        setTimeout(() => {
          el.classList.add('reveal-active');
        }, el.style.getPropertyValue('--delay') * 1000);
      });
    });
  </script>
</section>
