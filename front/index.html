<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vapor Deck | AI Slide Generator</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <div class="logo">
          VAPOR<span>DECK</span>
        </div>
        <div id="project-path-display" style="font-size: 0.7rem; color: var(--text-muted); font-family: var(--font-mono); margin-left: 20px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 400px; flex: 1;">Loading project...</div>
        <div class="top-controls">
          <select id="theme-select" class="btn">
            <option value="dark-tech">Dark Tech</option>
            <option value="clean-light">Clean Light</option>
            <option value="brutalist">Brutalist</option>
          </select>
          <select id="model-select" class="btn">
            <option value="ollama/gemma4:31b-cloud">Gemma 4 31B (Cloud)</option>
            <option value="google/gemini-2.0-flash">Gemini 2.0 Flash</option>
            <option value="openai/gpt-4o">GPT-4o</option>
          </select>
          


          <button id="new-deck-btn" class="btn" title="Discard current session and start fresh">↺ New Deck</button>
          <button id="export-btn" class="btn primary">Export PDF</button>
        </div>
      </header>

      <aside>
        <div class="sidebar-header" style="display: flex; justify-content: space-between; align-items: center;">
          Outline
          <button id="confirm-outline-btn" class="btn primary" style="display: none; padding: 2px 8px; font-size: 0.7rem;">Confirm</button>
        </div>
        <div id="outline-list" class="outline-list">
          <!-- Outline items will be injected here -->
          <div style="padding: 20px; color: var(--text-muted); font-size: 0.85rem;">
            No outline generated yet. Submit a topic to begin.
          </div>
        </div>
      </aside>

      <div id="resizer" class="resizer"></div>

      <main>
        <div id="preview-container">
          <div id="slide-loading-bar"><div id="slide-loading-fill"></div></div>
          <iframe id="slide-iframe" frameborder="0"></iframe>
          <div id="vision-indicator" class="vision-indicator">
            <span class="vision-eye">👁</span>
            <span class="vision-badge">NOT AUDITED</span>
          </div>
        </div>

        <div id="v-resizer" class="v-resizer"></div>
        
        <section id="interaction-shell">
          <div class="interaction-bar">

            <!-- Mode Pill Toggle -->
            <div class="mode-pill" title="Ctrl+P to toggle">
              <button class="mode-pill-btn active" id="interaction-mode-plan" data-mode="plan">Outline</button>
              <button class="mode-pill-btn" id="interaction-mode-design" data-mode="design">Design</button>
              <button class="mode-pill-btn" id="interaction-mode-build" data-mode="build">Build</button>
            </div>

            <!-- Plan Mode: Chat -->
            <div id="plan-interaction" class="interaction-pane">
              <div id="chat-history" class="chat-history">
                <!-- Messages injected here -->
              </div>

              <!-- Context Upload Panel (images + docs before outline generation) -->
              <div id="context-upload-panel" class="context-upload-panel">
                <div id="context-drop-zone" class="context-drop-zone" title="Upload images or documents to ground your presentation">
                  <span class="context-drop-icon">⊕</span>
                  <span class="context-drop-label">Add context <span class="context-drop-hint">images · PDF · DOCX</span></span>
                  <input id="context-file-input" type="file" accept="image/*,.pdf,.docx,.doc" multiple style="display:none;" />
                </div>
                <div id="context-file-pills" class="context-file-pills"></div>
              </div>

              <div class="input-row">
                <textarea id="prompt-input" class="cmd-input" placeholder="Describe a topic, add slides, or refine the outline..." rows="1"></textarea>
                <input
                  id="preferred-slides-input"
                  type="number"
                  min="3"
                  max="20"
                  value="8"
                  title="Preferred number of slides"
                  placeholder="# slides"
                  style="width:56px; background:var(--bg-input); border:1px solid var(--border); color:var(--text-main); border-radius:3px; padding:4px 6px; font-size:0.75rem; font-family:inherit; text-align:center;"
                />
                <button id="generate-btn" class="btn primary send-btn">Send</button>
              </div>
            </div>

            <!-- Design Mode: Chat -->
            <div id="design-interaction" class="interaction-pane" style="display:none;">
              <div id="design-chat-history" class="chat-history">
                <!-- Messages injected here -->
              </div>
              <div class="input-row">
                <textarea id="design-prompt-input" class="cmd-input" placeholder="Chat with the Design AI to shape the aesthetics..." rows="1"></textarea>
                <button id="design-generate-btn" class="btn primary send-btn">Send</button>
              </div>
            </div>

            <!-- Build Mode: Refine -->
            <div id="build-interaction" class="interaction-pane" style="display:none;">
              <div class="input-row">
                <textarea id="refine-instruction-input" class="cmd-input" placeholder="Describe a visual change, content update, or layout fix..." rows="1"></textarea>
                <div class="build-actions">
                  <button id="custom-regen-btn" class="btn primary refine-btn">Refine ✦</button>
                  <button id="regen-btn" class="btn icon-btn" title="Regenerate slide from scratch">↻</button>
                </div>
              </div>
              <input id="refine-image-input" type="file" accept="image/*" multiple style="display:none;" />
            </div>


            <div id="refine-panel" style="display:none;">
              <div id="refine-image-thumbs" class="thumb-strip"></div>
            </div>
          </div>
        </section>
      </main>

      <div id="r-resizer" class="resizer"></div>
      <aside id="info-sidebar" class="info-sidebar">
        <div class="sidebar-header" style="display:flex; justify-content:space-between; align-items:center;">
          Slide Details
          <div id="info-view-toggle" style="display:none; gap:3px; flex-shrink:0;">
            <button id="info-view-detail" class="btn active" style="padding:2px 8px; font-size:0.65rem;">Detail</button>
            <button id="info-view-overview" class="btn" style="padding:2px 8px; font-size:0.65rem;">Overview</button>
          </div>
        </div>
        <div id="info-list" class="info-list">
          <div style="padding: 20px; color: var(--text-muted); font-size: 0.85rem;">
            Select a slide or generate an outline to see details.
          </div>
        </div>
      </aside>

      <footer>
        <div class="status-indicator">
          <div class="status-dot"></div>
          <span id="status-text">IDLE</span>
        </div>
        <div id="slide-progress">Slide 0 / 0</div>
        <div id="model-info">VaporDeck 1.0</div>
      </footer>
      <!-- Comparison Overlay -->
      <div id="comparison-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; padding: 40px; gap: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <h2 style="font-size: 1rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em;">Refining Slide...</h2>
          <button id="close-comparison" class="btn">Close</button>
        </div>
        
        <div style="flex: 1; display: flex; gap: 20px; min-height: 0;">
          <div style="flex: 1; display: flex; flex-direction: column; gap: 12px;">
            <div style="color: var(--text-muted); font-size: 0.8rem;">BEFORE</div>
            <iframe id="iframe-before" style="flex: 1; border: 1px solid var(--border); border-radius: 4px; background: #000;"></iframe>
            <button id="keep-before-btn" class="btn" style="width: 100%; justify-content: center;">← Keep Current</button>
          </div>
          
          <div style="flex: 1; display: flex; flex-direction: column; gap: 12px;">
            <div style="color: var(--accent); font-size: 0.8rem;">AFTER (REFINED)</div>
            <iframe id="iframe-after" style="flex: 1; border: 1px solid var(--accent); border-radius: 4px; background: #000; box-shadow: 0 0 30px var(--accent-glow);"></iframe>
            <button id="use-after-btn" class="btn primary" style="width: 100%; justify-content: center;">Use Refined →</button>
          </div>
        </div>
        
        <div id="history-strip" style="display: flex; gap: 12px; height: 100px; overflow-x: auto; padding-bottom: 10px;">
          <!-- Thumbnails of refinement history -->
        </div>
      </div>
      <!-- Fullscreen Slideshow Overlay -->
      <div id="slideshow-overlay">
        <div id="slideshow-counter">0 / 0</div>
        <button id="slideshow-close" class="slideshow-btn" title="Close (Esc)">×</button>
        
        <div id="slideshow-frame">
          <iframe id="slideshow-iframe" frameborder="0"></iframe>
        </div>

        <button id="slideshow-prev" class="slideshow-btn" title="Previous (Left/Up)">‹</button>
        <button id="slideshow-next" class="slideshow-btn" title="Next (Right/Down)">›</button>
        <div id="slideshow-dots"></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
